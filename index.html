<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/Images/favicon-robot-48.png">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100%;
}

/* Whole page */
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Main content area */
.content {
  flex: 1;
  display: flex;
}

a {color: white;text-decoration: none;}



/* Left side */
.main {
  flex: 1;
  background-color: #E0FFFF;
  font-size: 30px;
  padding: 10px 40px;
  font-family: verdana;
  
  display: flex;
  justify-content: center; /* vertical centering */
  align-items: center;     /* horizontal centering */
  flex-direction: column;
  gap: 10px;
}

/* Right side */
.right {
  background-color: #2F4F4F;
  text-align: right;
  color: white;
  font-size: 30px;
  padding: 10px 40px;
  font-family:verdana;
  width: 420px;
}

/* Footer */
.footer {
  background-color: #292929;
  color: white;
  padding: 5px 20px;
  font-family:verdana;
}
a {color: #C2C2C2;text-decoration: none;}
a:hover {color: #00A9FF;}

/* Mobile layout */
@media screen and (max-width: 900px) {
  .content {
    flex-direction: column;
  }

  /* main and right are screen width */
  .main,
  .right {
    width: 100%;
  }
  
   /* Expand main vertically */
  .main {
    flex: 1;
  }
}
</style>
</head>

<body>

<div class="content">
  <div class="main">
    <h1 style="font-size:60px;">Max Lee's Website</h1>
    <p>Welcome to my website! Im an engineer who likes robots, climbing, baking, and lots of other stuff</p>
  </div>

  <div class="right">
    <a href="/Robot_Arm_Projects/"></a><h3>Robot Arm Projects</h3></a>
    <a href="/Recipes/"><h3>Recipes</h3></a>
    <a href="/Some_Stuff_I_Wrote/"></a><h3>Some stuff I wrote</h3></a>
    <a href="/Shoebox/"></a><h3>Shoebox</h3></a>
  </div>
</div>

<div class="footer">
  <p>Some other cool sites:<br>
        visit <a href="https://alv.cx">alv.cx</a><br>
        visit <a href="https://saltychips22.github.io">zebsite</a></p>
</div>

</body>
</html>
